<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trippie - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-gray-100 flex justify-center items-center min-h-screen font-['Inter']">
    
    <div class="w-[404px] bg-[#edf2f4] rounded-[31px] p-10 shadow-[0px_4px_20px_rgba(0,0,0,0.1)] relative max-[450px]:w-[90%] max-[450px]:px-5 max-[450px]:py-8">
      
      <h1 class="text-[32px] text-black font-bold text-center mb-2">
        Welcome Back!
      </h1>

      <p class="text-[12px] text-black font-bold text-center mb-8">
        Enter your email and password to log in
      </p>

      <!-- Error Container -->
      <div class="hidden w-full justify-center items-center mb-3" id="error-container">
        <p class="text-red-500 text-center text-[14px] w-full">
          Phone Number should be 10 digits
        </p>
      </div>

      <form id="loginForm" method="post" onsubmit="return validateLogInData(event)">
        
        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-[12px] text-[#2b2d42] font-bold mb-2">
            Email Address
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
            class="w-full h-[46px] rounded-md bg-white shadow-[0px_0px_4px_#00000040] px-3 text-[14px] outline-none focus:ring-2 focus:ring-red-400"
          />
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label for="password" class="block text-[12px] text-[#2b2d42] font-bold mb-2">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            class="w-full h-[46px] rounded-md bg-white shadow-[0px_0px_4px_#00000040] px-3 text-[14px] outline-none focus:ring-2 focus:ring-red-400"
          />
        </div>

        <!-- Footer -->
        <div class="flex justify-between text-[12px] font-bold my-6 max-[450px]:flex-col max-[450px]:gap-3 max-[450px]:text-center">
          <div class="text-[#2b2d42]">
            New User?
            <a href="signup.php" class="text-[#ef233c] underline cursor-pointer">
              Create an account
            </a>
          </div>
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full h-[44px] rounded-md bg-[#ef233c] text-white text-[15px] font-bold cursor-pointer transition duration-300 hover:bg-[#c71d31]"
        >
          Log In
        </button>
      </form>
    </div>

  </body>
</html>
